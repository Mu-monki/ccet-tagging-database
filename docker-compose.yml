services:
  mysql-db:
    image: mysql:8.0
    container_name: ccet_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_DB_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
      MYSQL_USER: ${MYSQL_DB_USER}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD}
    ports:
      - "${MYSQL_DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ccet_phpmyadmin
    environment:
      PMA_HOST: ${MYSQL_DB_HOST}  
      PMA_PORT: 3306              # Internal port PMA uses to connect to MySQL
      PMA_USER: ${MYSQL_DB_USER}
      PMA_PASSWORD: ${MYSQL_DB_PASSWORD}
    ports:
      - "${PMA_PORT}:80"          # Exposed port for the web UI
    depends_on:
      - mysql-db

volumes:
  mysql_data: